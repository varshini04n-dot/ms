<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup</title>
</head>
<body>
    <h1>News Letter Signup</h1>
    <form>
        <label for="fname">Full Name:</label>
        <input type="text" id="fname" name="fname" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
        <input type="checkbox" id="checkbox" name="checkbox" required>
        <label for="checkbox">I Agree all the terms and conditions given below</label><br><br>
        <label for="terms">Terms and Conditions:</label><br>
        <textarea id="terms"rows="3" cols="50" readonly>
            1. You Must Read all newspapers
            2. You Must Read all magazines
            3. Your data is safe.
            4. You will get news updates on daily basis.
        </textarea>
        <br><br>
        <input type="submit" name="submit"value="Submit">
    </form>
    <h5>&copy;2026 Newsletter Signup. All rights reserved.</h5>
</body>
</html>
